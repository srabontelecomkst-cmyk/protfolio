[build]
command = "npm run build:client"
functions = "netlify/functions"
publish = "dist/spa"


[functions]
external_node_modules = ["express"]
node_bundler = "esbuild"

[[integrations]]
name = "mcp"
provider = "openai"
config = { api_key = "$OPENAI_API_KEY" }

[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"
